{% set name = "excelcsvparsehelper-with-locking" %}
{% set version = "1.2.3" %}

package:
  name: {{ name }}
  version: {{ version }}

build:
  noarch: generic
  number: 0
  

requirements:
  run:
    - excelcsvparsehelper >=1.2.3
    - lockfilesemaphore >=3.0.2

test:
  imports:
    - ExcelCSVParseHelper
    - LockFileSemaphore
  requires:
    - python

about:
  home: https://pypi.org/project/ExcelCSVParseHelper/
  doc_url: https://pypi.org/project/LockFileSemaphore/
  summary: "Metapackage that installs ExcelCSVParseHelper and LockFileSemaphore."
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Marcin-kowalczyk-polenergia
